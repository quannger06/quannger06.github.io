<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 1 - Sum Two Numbers</title>
  <script>
    const txta = prompt("Enter number A");
    const txtb = prompt("Enter number B");

    if (txta === null || txta.trim() === "" || isNaN(txta)) {
      alert("Number A is formatted incorrect");
    } else if (txtb === null || txtb.trim() === "" || isNaN(txtb)) {
      alert("Number B is formatted incorrect");
    } else {
      const result = parseFloat(txta) + parseFloat(txtb);
      alert("Result:\n" + txta + " + " + txtb + " = " + result);
    }
  </script>
</head>
<body></body>
</html>
